name: TAIFEX Crawler

on:
  schedule:
    # Taiwan Time 07:00 (UTC 23:00 previous day) - Before day session opens
    - cron: '0 23 * * *'
    # Taiwan Time 14:00 (UTC 06:00) - Before night session opens
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        python -m unittest discover -s tests -p 'test_*.py' -v

    - name: Run crawler
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        MONGO_DB: ${{ vars.MONGO_DB }}
        MONGO_COLLECTION: ${{ vars.MONGO_COLLECTION }}
        TAIFEX_DAY_URL: ${{ vars.TAIFEX_DAY_URL }}
        TAIFEX_NIGHT_URL: ${{ vars.TAIFEX_NIGHT_URL }}
        TAIFEX_FUTURE_URL: ${{ vars.TAIFEX_FUTURE_URL }}
      run: |
        python main.py
