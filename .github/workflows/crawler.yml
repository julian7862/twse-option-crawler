name: CI/CD & Scheduled Crawler

on:
  pull_request:
    branches: [ main ]
  schedule:
    # Taiwan Time 07:00 (UTC 23:00 previous day) - Before day session opens
    - cron: '0 23 * * *'
    # Taiwan Time 14:00 (UTC 06:00) - Before night session opens
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=src --cov-report=term-missing

    - name: Check test coverage
      run: |
        pytest tests/ --cov=src --cov-report=xml --cov-fail-under=50

  crawl:
    name: Run Crawler
    runs-on: ubuntu-latest
    needs: test  # Only run if tests pass
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run crawler
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        MONGO_DB: ${{ vars.MONGO_DB }}
        MONGO_COLLECTION: ${{ vars.MONGO_COLLECTION }}
        TAIFEX_DAY_URL: ${{ vars.TAIFEX_DAY_URL }}
        TAIFEX_NIGHT_URL: ${{ vars.TAIFEX_NIGHT_URL }}
        TAIFEX_FUTURE_URL: ${{ vars.TAIFEX_FUTURE_URL }}
      run: |
        python main.py
